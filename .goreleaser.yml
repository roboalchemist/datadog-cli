version: 2
builds:
  - env: [CGO_ENABLED=0]
    goos: [linux, darwin, windows]
    goarch: [amd64, arm64]
    ldflags:
      - -s -w -X main.version={{.Version}}
archives:
  - format_overrides:
      - goos: windows
        format: zip
brews:
  - repository:
      owner: roboalchemist
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    folder: Formula
    homepage: "https://github.com/roboalchemist/datadog-cli"
    description: "Read-only CLI for querying Datadog APIs"
    license: "MIT"
    install: |
      bin.install "datadog-cli"
    test: |
      system "#{bin}/datadog-cli", "--version"
checksum:
  name_template: checksums.txt
changelog:
  sort: asc
  filters:
    exclude: ['^\[docs\]', '^\[test\]', '^Merge']
