name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run unit tests
        # NOTE: go test ./... includes spec contract validation via newTestSrv
        # (see cmd/spec_validator_test.go). Every mock test verifies that the
        # requests sent by each command match the Datadog OpenAPI spec, so CI
        # will fail automatically if a command sends a malformed or unknown
        # request. No additional spec-check step is needed here.
        run: make test-unit

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    # Only run on pushes (not PRs from forks — they don't have secrets)
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run integration tests
        env:
          DD_API_KEY: ${{ secrets.DD_API_KEY }}
          DD_APP_KEY: ${{ secrets.DD_APP_KEY }}
        timeout-minutes: 5
        run: make test-integration
